name: Build and Push Docker Images

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/**"
      - "scripts/build-and-push-images.sh"
      - ".github/workflows/build-and-push-images.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "scripts/build-and-push-images.sh"
      - ".github/workflows/build-and-push-images.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag"
        required: false
        default: "latest"
      force_build:
        description: "Force build all images"
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ap-northeast-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      locust-changed: ${{ steps.changes.outputs.locust }}
      webserver-changed: ${{ steps.changes.outputs.webserver }}
      force-build: ${{ steps.force.outputs.force }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for forced build
        id: force
        run: |
          if [ "${{ github.event.inputs.force_build }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "force=true" >> $GITHUB_OUTPUT
          else
            echo "force=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ steps.force.outputs.force }}" = "true" ]; then
            echo "locust=true" >> $GITHUB_OUTPUT
            echo "webserver=true" >> $GITHUB_OUTPUT
          else
            # Check for changes in specific paths
            if git diff --name-only HEAD~1 HEAD | grep -q "^apps/locust/"; then
              echo "locust=true" >> $GITHUB_OUTPUT
            else
              echo "locust=false" >> $GITHUB_OUTPUT
            fi
            
            if git diff --name-only HEAD~1 HEAD | grep -q "^apps/webserver/"; then
              echo "webserver=true" >> $GITHUB_OUTPUT
            else
              echo "webserver=false" >> $GITHUB_OUTPUT
            fi
          fi

  build-locust:
    needs: detect-changes
    if: needs.detect-changes.outputs.locust-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Locust image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: locust-fargate-locust-custom
          IMAGE_TAG: ${{ github.event.inputs.tag || 'latest' }}
        run: |
          # マルチアーキテクチャビルド（AMD64用）
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./apps/locust

      - name: Update ECS service (Locust Master)
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecs update-service \
            --cluster locust-fargate-cluster \
            --service locust-fargate-master-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} || true

      - name: Update ECS service (Locust Worker)
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecs update-service \
            --cluster locust-fargate-cluster \
            --service locust-fargate-worker-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} || true

  build-webserver:
    needs: detect-changes
    if: needs.detect-changes.outputs.webserver-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Webserver image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: locust-fargate-test-webserver
          IMAGE_TAG: ${{ github.event.inputs.tag || 'latest' }}
        run: |
          # マルチアーキテクチャビルド（AMD64用）
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./apps/webserver

      - name: Update ECS service (Webserver)
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecs update-service \
            --cluster locust-fargate-cluster \
            --service locust-fargate-target-test-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} || true

  notify-completion:
    needs: [detect-changes, build-locust, build-webserver]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify completion
        run: |
          echo "Build and Push completed!"
          echo "Locust changed: ${{ needs.detect-changes.outputs.locust-changed }}"
          echo "Webserver changed: ${{ needs.detect-changes.outputs.webserver-changed }}"
          echo "Force build: ${{ needs.detect-changes.outputs.force-build }}"
